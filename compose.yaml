version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: tailorforge-db
    environment:
      POSTGRES_USER: tailorforge_admin
      POSTGRES_PASSWORD: temp_password_change_me
      POSTGRES_DB: tailorforge
    ports:
      - "5432:5432"
    volumes:
      - tf-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tailorforge_admin -d tailorforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: tailorforge-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - tf-qdrant-data:/qdrant/storage

  parser:
    build:
      context: ./parser_service
      dockerfile: Containerfile
    container_name: tailorforge-parser
    ports:
      - "8081:8080"
    environment:
      - PORT=8080

  api:
    build:
      context: ./backend
      dockerfile: Containerfile
    container_name: tailorforge-api
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_started
      parser:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql://tailorforge_admin:temp_password_change_me@db/tailorforge
      - QDRANT_URL=http://qdrant:6333
      - PARSER_SERVICE_URL=http://parser:8080
      - DRONE_API_URL=http://host.containers.internal:8001
      - ENV=development
      - SECRET_KEY=super-secret-dev-key

  web:
    build:
      context: ./frontend
      dockerfile: Containerfile
    container_name: tailorforge-web
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      - BACKEND_URL=http://api:8000

volumes:
  tf-db-data:
  tf-qdrant-data:
